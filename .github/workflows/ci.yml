name: Gatekeeper Validation CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  validate-substrate:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]
        pip install jax jaxlib pytest numpy

    - name: Pre-Expansion Boundary Check
      run: |
        # Verify no circular import deadlocks or structural faults
        python src/main.py --input tasks.json --max-rounds 1

    - name: Global Regression Testing
      run: |
        # Execute stress test suite to verify JAX/XLA stability
        pytest tests/test_stress.py