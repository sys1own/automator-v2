name: Cloud Evolution Factory

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  evolution-flight:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install System Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install jax jaxlib numpy pytest
        pip install -e .

    - name: Execute 5-Generation Evolution Harness
      run: python hyper_evolution_harness.py

    - name: Context Compression & Bundling
      run: python bundle_repo.py

    - name: Autonomous Graduation & State Push
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'

        git add src/ tasks.json repo_context_bundle.txt

        if ! git diff --cached --quiet; then
          git commit -m "auto(evolution): graduate converged architectural state [skip ci]"
          git push
          echo "[Success] Evolution state pushed to origin."
        else
          echo "[Status] No architectural drift; skipping commit."
        fi