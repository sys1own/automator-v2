name: Autonomous Substrate Evolution Loop

on:
  push:
    branches:
      - main  # Change this to match your active development branch if not main

# Concurrency Gate: Ensures only ONE evolutionary runner executes at any given moment.
# Subsequent runs triggered by automated pushes will queue up in a perfect, serialized line.
concurrency:
  group: substrate-evolution-gate
  cancel-in-progress: false

jobs:
  evolve:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # CRITICAL: To allow automated pushes to trigger the next workflow run recursively,
          # you must use a Personal Access Token (PAT) here instead of the default GITHUB_TOKEN.
          token: ${{ secrets.EVOLUTION_PAT }}
          fetch-depth: 0

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Foundational Substrate Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy typing-extensions
          pip install --upgrade "jax[cpu]"

      - name: Inject Git Identity Primitives
        run: |
          git config --local user.email "autonomous-bot@substrate-framework.ai"
          git config --local user.name "Substrate Evolution Loop"

      - name: Execute Autonomous Generation Flight
        run: |
          python hyper_evolution_harness.py
