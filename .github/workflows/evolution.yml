name: Continuous Evolution Factory

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  evolve:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Evolving Repository Branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Initialize Execution Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Acceleration Packages
        run: |
          python -m pip install --upgrade pip
          pip install numpy jax jaxlib pytest

      - name: Execute High-Throughput Multi-Generation Optimization Loop
        run: |
          rm -f context/automator_execution.log
          python hyper_evolution_harness.py

      - name: Run Token Compressor
        run: |
          python bundle_repo.py

      - name: Autonomous Code Graduation Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add src/automator/substrate_engine.py tasks.json repo_context_bundle.txt
          
          if git diff --staged --quiet; then
            echo "No evolutionary modifications detected during this run cycle."
          else
            git commit -m "auto(evolution): update convergence thresholds and step optimization [skip ci]"
            
            # Synchronize with remote changes right before pushing
            echo "Fetching remote updates to resolve concurrency gaps..."
            git fetch origin
            
            # Rebase our automated commit on top of any parallel remote changes
            git rebase origin/${{ github.ref_name }} || (git rebase --skip)
            
            # Direct atomic upstream update push
            git push origin HEAD:${{ github.ref_name }}
          fi
