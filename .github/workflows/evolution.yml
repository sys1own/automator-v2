name: Autonomous Framework Evolution Flow

on:
  schedule:
    - cron: '*/20 * * * *' # Triggers automatically every 20 minutes
  workflow_dispatch:      # Allows manual trigger via GitHub UI

# THE CRUCIAL FIX: Explicitly allow the workflow runner to write back to the repo
permissions:
  contents: write

jobs:
  evolve-substrate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository State
        uses: actions/checkout@v4
        with:
          persist-credentials: true 

      - name: Initialize Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Materialize Runtime Framework Dependencies
        run: |
          pip install numpy jax jaxlib scipy psutil pytest typing-extensions

      - name: Configure Automated Git Run Identity
        run: |
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Run Multi-Stage Optimization Flight
        run: |
          python hyper_evolution_harness.py
