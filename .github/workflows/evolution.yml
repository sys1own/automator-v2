name: Autonomous Evolution Driver

on:
  schedule:
    - cron: '0 0 * * *'  # Executes daily at midnight
  workflow_dispatch:     # Allows manual trigger via GitHub UI

jobs:
  evolution-flight:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install Framework Core
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]
        pip install jax jaxlib numpy scipy psutil

    - name: Execute Evolutionary Flight
      run: |
        # Purge stale logs to ensure fresh telemetry harvesting
        rm -f context/automator_execution.log
        # Launch the high-throughput 5-generation harness
        python hyper_evolution_harness.py

    - name: Context Compression & Bundling
      run: |
        # Generate token-optimized workspace snapshot
        python bundle_repo.py

    - name: Autonomous Codebase Graduation
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        
        # Stage structural improvements and converged parameters
        git add src/ tasks.json repo_context_bundle.txt
        
        # Only commit if actual delta is detected
        if ! git diff --cached --quiet; then
          git commit -m "auto(evolution): converge codebase state V=4.6005 [skip ci]"
          git push
          echo "[Success] Evolved state graduated to repository."
        else
          echo "[Status] No architectural drift detected; skipping commit."
        fi